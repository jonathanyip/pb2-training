services:
  api:
    build: .
    image: pb2-training
    ports:
      - "8000:8000"
    # All state (DB, videos, frames, models, datasets) lives in /data, which is
    # backed by the named volume below so it survives container rebuilds.
    volumes:
      - pb2-data:/data
    restart: unless-stopped

volumes:
  pb2-data:
